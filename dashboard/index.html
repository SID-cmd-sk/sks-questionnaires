<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKS Admin — Request Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #CC0000; --darkred: #A00000;
    --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
    --text: #e8e8e8; --muted: #888; --accent: #006FA6;
    --green: #00a86b; --orange: #e07a00; --yellow: #d4a000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: var(--card); border-bottom: 2px solid var(--red);
    padding: 0 28px; display: flex; align-items: center;
    gap: 16px; height: 58px;
  }
  .header-brand { font-family: 'Rajdhani', sans-serif; }
  .header-brand .logo { color: var(--red); font-size: 22px; font-weight: 700; }
  .header-brand .sub  { color: var(--muted); font-size: 11px; letter-spacing: .08em; }
  .header-title { color: var(--text); font-family: 'Rajdhani', sans-serif;
    font-size: 17px; font-weight: 600; letter-spacing: .06em;
    border-left: 1px solid var(--border); padding-left: 16px; margin-left: 4px; }
  .header-spacer { flex: 1; }
  .refresh-btn {
    background: var(--border); border: none; color: var(--muted);
    padding: 7px 16px; border-radius: 5px; cursor: pointer;
    font-size: 13px; transition: background .2s;
  }
  .refresh-btn:hover { background: #333; color: var(--text); }

  /* ── Layout ── */
  .layout { display: flex; height: calc(100vh - 58px); }
  .sidebar { width: 220px; background: var(--card);
    border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* ── Sidebar nav ── */
  .nav-section { padding: 0 14px; margin-bottom: 6px;
    font-size: 10px; color: var(--muted); letter-spacing: .1em;
    text-transform: uppercase; font-family: 'Rajdhani', sans-serif; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; cursor: pointer; transition: background .15s;
    font-size: 14px; color: var(--muted); border-left: 3px solid transparent;
  }
  .nav-item:hover  { background: rgba(204,0,0,.07); color: var(--text); }
  .nav-item.active { background: rgba(204,0,0,.12); color: var(--text);
    border-left-color: var(--red); }
  .nav-badge {
    margin-left: auto; background: var(--red);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 1px 7px; border-radius: 10px;
  }

  /* ── Analytics cards ── */
  .analytics { display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-bottom: 24px; }
  @media(max-width:900px) {
    .analytics { grid-template-columns: repeat(2, 1fr); }
    .sidebar { width: 52px; }
    .nav-item span, .nav-section, .nav-badge { display: none; }
    .nav-item { justify-content: center; padding: 12px; }
  }
  .a-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px;
  }
  .a-card-val { font-family: 'Rajdhani', sans-serif;
    font-size: 34px; font-weight: 700; }
  .a-card-lbl { font-size: 12px; color: var(--muted); letter-spacing: .06em;
    text-transform: uppercase; margin-top: 4px; }
  .c-red    { color: var(--red); }
  .c-green  { color: var(--green); }
  .c-orange { color: var(--orange); }
  .c-accent { color: var(--accent); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 12px; margin-bottom: 18px; align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 9px 14px; border-radius: 6px;
    font-size: 14px; flex: 1; min-width: 200px; outline: none;
    transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--red); }
  .filter-select {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 6px;
    font-size: 13px; outline: none; cursor: pointer;
  }

  /* ── Table ── */
  .table-wrap {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #111; padding: 11px 14px; text-align: left;
    font-size: 11px; color: var(--muted); letter-spacing: .08em;
    text-transform: uppercase; font-weight: 600;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .12s; cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  tbody td {
    padding: 12px 14px; font-size: 13px; vertical-align: middle;
  }
  .td-id   { font-family: 'Rajdhani', sans-serif; font-weight: 700;
    color: var(--red); font-size: 14px; }
  .td-name { font-weight: 600; }
  .td-machines { color: var(--muted); font-size: 12px; }

  /* ── Status badges ── */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; font-family: 'Rajdhani', sans-serif;
  }
  .badge-pending    { background: rgba(212,160,0,.15); color: var(--yellow); border: 1px solid rgba(212,160,0,.3); }
  .badge-in_progress{ background: rgba(0,111,166,.15); color: var(--accent); border: 1px solid rgba(0,111,166,.3); }
  .badge-delivered  { background: rgba(0,168,107,.15); color: var(--green);  border: 1px solid rgba(0,168,107,.3); }
  .badge-cancelled  { background: rgba(100,100,100,.15); color: #666; border: 1px solid #333; }

  .dl-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 4px 10px; border-radius: 4px;
    font-size: 12px; cursor: pointer; transition: all .15s;
    text-decoration: none; display: inline-block;
  }
  .dl-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Detail drawer ── */
  .drawer {
    position: fixed; right: 0; top: 58px; bottom: 0; width: 420px;
    background: var(--card); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 24px; z-index: 100;
    transform: translateX(100%); transition: transform .25s ease;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--muted);
    font-size: 22px; cursor: pointer;
  }
  .drawer-id { font-family: 'Rajdhani', sans-serif; font-size: 13px;
    color: var(--red); letter-spacing: .08em; margin-bottom: 4px; }
  .drawer-name { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
  .drawer-section { margin-bottom: 20px; }
  .drawer-section-title { font-size: 11px; color: var(--muted);
    letter-spacing: .08em; text-transform: uppercase;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
    margin-bottom: 10px; }
  .drawer-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .drawer-row-label { color: var(--muted); min-width: 90px; }
  .machine-chip {
    background: #111; border: 1px solid var(--border);
    border-radius: 5px; padding: 8px 12px; margin-bottom: 8px;
    font-size: 12px;
  }
  .machine-chip-name { font-weight: 600; color: var(--text); }
  .machine-chip-meta { color: var(--muted); margin-top: 2px; }

  .status-selector {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 5px;
    font-size: 13px; width: 100%; outline: none; margin-top: 8px;
  }
  .update-btn {
    background: var(--red); color: #fff; border: none;
    padding: 9px 20px; border-radius: 5px; font-family: 'Rajdhani', sans-serif;
    font-size: 14px; font-weight: 700; letter-spacing: .06em;
    cursor: pointer; margin-top: 10px; width: 100%;
  }
  .update-btn:hover { background: var(--darkred); }

  /* ── Loader / empty ── */
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .empty   { text-align: center; padding: 60px; color: #444; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; border: 1px solid var(--border);
    color: var(--text); padding: 10px 24px; border-radius: 6px;
    font-size: 13px; z-index: 9999; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-brand">
    <div class="logo">SKS</div>

<!-- ── Layout ── -->
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">

      <div class="a-card">
        <div class="a-card-val c-accent" id="stat-inprog">—</div>

      <div class="a-card">

    <!-- Toolbar -->
    <div class="toolbar">

<script>
const CFG = window.SKS_CONFIG || {};
const SB_URL = CFG.SUPABASE_URL || '';
const SB_KEY = CFG.SUPABASE_ANON_KEY || '';

let allRequests = [];
let _visibleRows = [];
let activeStatus = '';

// ── Supabase fetch ────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Load all requests ─────────────────────────────────────
async function loadRequests() {
  document.getElementById('table-body').innerHTML =
    '<div class="loading">Loading…</div>';
  try {
    const data = await sbFetch(
      '/rest/v1/requests?select=*&order=submitted_at.desc',
      { headers: { 'Range': '0-499', 'Prefer': 'count=exact' } }
    );
    allRequests = data;
    updateStats(data);
    applyFilters();
  } catch(e) {
    document.getElementById('table-body').innerHTML =
      `<div class="loading" style="color:#cc0000">Error: ${e.message}<br>
       <small style="color:#666">Check env.js Supabase config</small></div>`;
  }
}

// ── Stats ─────────────────────────────────────────────────
function updateStats(data) {
  const total   = data.length;
  const pending = data.filter(r=>r.status==='pending').length;
  const inprog  = data.filter(r=>r.status==='in_progress').length;
  const deliv   = data.filter(r=>r.status==='delivered').length;

  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-pending').textContent  = pending;
  document.getElementById('stat-inprog').textContent   = inprog;
  document.getElementById('stat-delivered').textContent= deliv;

  document.getElementById('badge-all').textContent      = total;
  document.getElementById('badge-pending').textContent  = pending;
  document.getElementById('badge-inprog').textContent   = inprog;
  document.getElementById('badge-delivered').textContent= deliv;
}

// ── Filters ───────────────────────────────────────────────
function filterByStatus(s) {
  activeStatus = s;
  document.getElementById('status-filter').value = s;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search-box').value.toLowerCase();
  const s = document.getElementById('status-filter').value || activeStatus;

  let rows = allRequests;
  if (s) rows = rows.filter(r => r.status === s);
  if (q) rows = rows.filter(r =>
    (r.customer_name||'').toLowerCase().includes(q) ||
    (r.request_id||'').toLowerCase().includes(q) ||
    (r.email||'').toLowerCase().includes(q) ||
    JSON.stringify(r.machines_json||'').toLowerCase().includes(q)
  );
  _visibleRows = rows;
  renderTable(rows);
}

// ── Render table ──────────────────────────────────────────
function parseMachines(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'object') return Array.isArray(raw) ? raw : [];
  if (typeof raw === 'string') {
    try { const p = JSON.parse(raw); return Array.isArray(p) ? p : []; }
    catch(e) { console.warn('machines_json parse error:', e); return []; }
  }
  return [];
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('table-body').innerHTML =
      '<div class="empty">No requests found.</div>';
    return;
  }
  let html = `<table><thead><tr>
    <th>Request ID</th><th>Customer</th><th>Machines</th>
    <th>Status</th><th>Submitted</th><th>ZIP</th>
  </tr></thead><tbody>`;

  rows.forEach((r, i) => {
    const machines = parseMachines(r.machines_json);
    const mNames   = machines.slice(0,2).map(m=>m.machine_name||'—').join(', ');
    const mMore    = machines.length > 2 ? ` +${machines.length-2}` : '';
    const dt       = new Date(r.submitted_at).toLocaleDateString('en-IN');
    // Store row index, openDrawer reads from allRequests array — no JSON escaping issues
    html += `<tr onclick="openDrawer(${i})">
      <td class="td-id">${r.request_id}</td>
      <td class="td-name">${esc(r.customer_name)}</td>
      <td class="td-machines">${esc(mNames)}${mMore}</td>
      <td><span class="badge badge-${r.status}">${r.status.replace('_',' ')}</span></td>
      <td style="color:var(--muted);font-size:12px;">${dt}</td>
      <td>${r.zip_url
        ? `<a class="dl-btn" href="${r.zip_url}" target="_blank" onclick="event.stopPropagation()">⬇ ZIP</a>`
        : '<span style="color:#444;font-size:12px;">—</span>'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-body').innerHTML = html;
}

// ── Detail drawer ─────────────────────────────────────────
function openDrawer(idx) {
  const r = _visibleRows[idx];
  if (!r) return;
  const machines = parseMachines(r.machines_json);
  const dt = new Date(r.submitted_at).toLocaleString('en-IN');

  let machineHtml = machines.map(m => `
    <div class="machine-chip">
      <div class="machine-chip-name">${esc(m.machine_name||'—')}</div>
      <div class="machine-chip-meta">
        ${esc(m.machine_type||'')}
        ${m.axis ? ' · ' + esc(m.axis) : ''}
        ${m.controller ? ' · ' + esc(m.controller) : ''}
      </div>
    </div>`).join('') || '<div style="color:var(--muted);font-size:13px;">No machines recorded</div>';

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-id">${r.request_id}</div>
    <div class="drawer-name">${esc(r.customer_name)}</div>
    <span class="badge badge-${r.status}">${r.status.replace('_',' ')}</span>

    <div class="drawer-section" style="margin-top:16px;">
      <div class="drawer-section-title">Contact</div>
      <div class="drawer-row"><span class="drawer-row-label">Email</span><span>${esc(r.email||'—')}</span></div>
      <div class="drawer-row"><span class="drawer-row-label">Phone</span><span>${esc(r.contact||'—')}</span></div>
      <div class="drawer-row"><span class="drawer-row-label">Submitted</span><span>${dt}</span></div>
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Machines (${machines.length})</div>
      ${machineHtml}
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Files</div>
      ${r.zip_url
        ? `<a class="dl-btn" href="${r.zip_url}" target="_blank" style="display:block;text-align:center;padding:10px;">⬇ Download ZIP Package</a>`
        : '<div style="color:var(--muted);font-size:13px;">No files uploaded</div>'}
    </div>

    <div class="drawer-section">
      <div class="drawer-section-title">Update Status</div>
      <select class="status-selector" id="new-status">
        <option value="pending"     ${r.status==='pending'     ?'selected':''}>Pending</option>
        <option value="in_progress" ${r.status==='in_progress' ?'selected':''}>In Progress</option>
        <option value="delivered"   ${r.status==='delivered'   ?'selected':''}>Delivered</option>
        <option value="cancelled"   ${r.status==='cancelled'   ?'selected':''}>Cancelled</option>
      </select>
      <button class="update-btn" onclick="updateStatus('${r.request_id}')">
        UPDATE STATUS
      </button>
    </div>`;

  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

// ── Update status ─────────────────────────────────────────
async function updateStatus(requestId) {
  const newStatus = document.getElementById('new-status').value;
  const btn = document.querySelector('.update-btn');
  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    const res = await fetch(SB_URL + `/rest/v1/requests?request_id=eq.${encodeURIComponent(requestId)}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status: newStatus })
    });
    if (!res.ok) {
      const body = await res.text();
      // status_logs trigger fires — anon needs INSERT on status_logs too
      if (body.includes('status_logs')) {
        toast('⚠ Run SQL patch: supabase/patch_add_update_policy.sql', true);
      } else {
        toast('Error: ' + body, true);
      }
      return;
    }
    toast('Status updated ✓');
    closeDrawer();
    loadRequests();
  } catch(e) {
    toast('Error: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'UPDATE STATUS';
  }
}

// ── Export CSV ────────────────────────────────────────────
function exportCSV() {
  if (!allRequests.length) { toast('No data to export'); return; }
  const cols = ['request_id','customer_name','email','contact',
                'machine_count','status','submitted_at','zip_url'];
  let csv = cols.join(',') + '\n';
  allRequests.forEach(r => {
    csv += cols.map(c => `"${(r[c]||'').toString().replace(/"/g,'""')}"`).join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `sks_requests_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = err ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ── Init ──────────────────────────────────────────────────
if (!SB_URL || !SB_KEY) {
  document.getElementById('table-body').innerHTML = `
    <div class="loading" style="color:#d4a000">
      ⚙️ Dashboard not configured.<br>
      <small style="color:#666">Add SUPABASE_URL and SUPABASE_ANON_KEY to env.js</small>
    </div>`;
} else {
  loadRequests();
}
</script>
